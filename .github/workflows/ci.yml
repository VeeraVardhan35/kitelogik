name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy kitelogik

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pip install pytest-cov
      - name: Run unit tests with coverage
        run: >
          pytest -q -m "not integration"
          --tb=short
          --cov
          --cov-report=xml
          --cov-fail-under=70
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache/

  opa-policy-tests:
    name: OPA policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - name: Run OPA unit tests
        run: opa test kitelogik/policies/ -v
      - name: Check policy formatting
        run: opa fmt --fail --diff kitelogik/policies/

  integration:
    name: Integration tests (Docker + OPA)
    runs-on: ubuntu-latest
    # Weekly cron + manual dispatch only — not on PRs. Deliberate: the Docker+OPA
    # spin-up slows every PR, and the unit + OPA-test jobs already cover the
    # policy surface. Run manually (Actions → Run workflow) before a release to
    # catch any integration-only drift. The integration conftest manages its
    # own OPA container via `docker run`, so no `services:` block is needed.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest -q -m "integration" --tb=short

  fuzz:
    name: Fuzz tests (hypothesis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run fuzz tests
        run: >
          pytest tests/fuzz/ -q
          --tb=short
          -x

  security:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - uses: pypa/gh-action-pip-audit@v1.1.0

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # Uses the gitleaks OSS binary directly. The `gitleaks/gitleaks-action`
    # wrapper requires a paid license for org-owned repos; the underlying
    # tool is MIT-licensed and free. `.gitleaksignore` is respected either
    # way.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for historical secret detection
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSLf \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan full history
        run: gitleaks detect --source . --redact --verbose --no-banner --exit-code 1

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event.repository.visibility == 'public'
    permissions:
      security-events: write  # publish to Security tab
      id-token: write         # OIDC token for Scorecard
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
