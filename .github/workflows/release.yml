name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write      # create GitHub release
  id-token: write      # PyPI trusted publishing (OIDC)
  actions: read        # SLSA provenance

jobs:

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  sbom:
    name: Generate SBOM (CycloneDX)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Generate CycloneDX SBOM
        uses: CycloneDX/gh-python-generate-sbom@v2
        with:
          input: pyproject.toml
          output: kitelogik-sbom.cdx.json
          format: json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: kitelogik-sbom.cdx.json

  provenance:
    name: SLSA Provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects-as-file: true
      upload-assets: false

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publisher — no API token required.
        # Configure at: https://pypi.org/manage/project/kitelogik/settings/publishing/

  github-release:
    name: Create GitHub release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git-cliff sees every commit since the last tag
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/
      - name: Generate release notes (git-cliff)
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/*
            sbom/kitelogik-sbom.cdx.json
